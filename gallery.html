<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Shamli Stone Work</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo"><i class="fas fa-mountain"></i> Shamli Stone Work</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="login.html" class="admin-link"><i class="fas fa-lock"></i> Admin</a></li>
            </ul>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
    </nav>

    <!-- Gallery Header -->
    <section class="page-header">
        <h1>हमारा पोर्टफोलियो</h1>
        <p>हमारे प्रीमियम स्टोन और टाइल कार्यों का संग्रह देखें</p>
    </section>

    <!-- Category Filter -->
    <section class="gallery-filter">
        <div class="container">
            <button class="filter-btn active" data-filter="all">सभी</button>
            <!-- Categories yahan dynamically load hongi -->
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="gallery-section">
        <div class="container">
            <div id="gallery-container">
                <div style="text-align: center; padding: 50px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #667eea;"></i>
                    <p style="margin-top: 20px; font-size: 1.2rem; color: #666;">Photos लोड हो रही हैं...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Shamli Stone Work. All Rights Reserved.</p>
            <div class="social-links">
                <a href="https://facebook.com" target="_blank" class="facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://instagram.com" target="_blank" class="instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/919627535352" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <!-- Scripts - IMPORTANT! -->
    <script src="script.js"></script>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase Config -->
    <script src="supabase.js"></script>
    
    <!-- Gallery Logic -->
    <script src="gallery.js"></script>
</body>
</html>
