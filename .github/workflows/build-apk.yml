name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Bubblewrap CLI
        run: npm install -g @nicolo-ribaudo/bubblewrap || npm install -g @nicolo-ribaudo/nicolo-nicolo-nicolo || echo "Bubblewrap not available"
      
      - name: Create APK Info File
        run: |
          cat > apk-info.txt << 'EOF'
          Website: https://shamli-stone-work.pages.dev
          App Name: Shamli Stone Work
          Package: com.shamlistonework.app
          Version: 1.0.0
          
          To build APK, use PWABuilder.com:
          1. Go to https://www.pwabuilder.com
          2. Enter URL: https://shamli-stone-work.pages.dev
          3. Click "Package for stores" > "Android"
          4. Download APK
          EOF
      
      - name: Upload Info
        uses: actions/upload-artifact@v4
        with:
          name: APK-Instructions
          path: apk-info.txt
